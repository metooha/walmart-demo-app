<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="none" viewBox="0 0 32 32">
  <!-- Dollar bill shape with Walmart blue -->
  <g>
    <!-- Bill outline -->
    <rect x="4" y="8" width="24" height="16" rx="2" fill="#002E99" stroke="#2E2F32" stroke-width="1"/>
    <!-- Dollar sign -->
    <g fill="white">
      <circle cx="16" cy="16" r="6" fill="#002E99"/>
      <text x="16" y="19" font-size="12" font-weight="bold" text-anchor="middle" fill="white">$</text>
    </g>
  </g>
</svg>
